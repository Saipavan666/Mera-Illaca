<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka — Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .market-toolbar { display:flex; gap:12px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
    .search-bar { flex:1; min-width:200px; display:flex; align-items:center; background:white; border:1.5px solid var(--gray-200); border-radius: var(--radius-sm); overflow:hidden; }
    .search-bar input { flex:1; padding:10px 14px; border:none; outline:none; font-family:var(--font); font-size:0.9rem; }
    .search-bar button { padding:10px 14px; background:var(--primary); border:none; cursor:pointer; color:white; }
    .cat-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
    .cat-tab { padding:7px 16px; border-radius:20px; border:1.5px solid var(--gray-200); background:white; font-size:0.82rem; font-weight:600; color:var(--gray-600); cursor:pointer; transition:all var(--transition); }
    .cat-tab.active { background:var(--primary); border-color:var(--primary); color:white; }

    /* Listing card */
    .listing-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:16px; }
    .listing-card { background:white; border-radius:var(--radius); border:1px solid var(--gray-200); overflow:hidden; transition:all var(--transition); cursor:pointer; }
    .listing-card:hover { transform:translateY(-3px); box-shadow:var(--shadow); }
    .listing-img { height:160px; background:var(--gray-100); display:flex; align-items:center; justify-content:center; font-size:3.5rem; position:relative; }
    .listing-badge { position:absolute; top:10px; left:10px; }
    .listing-info { padding:14px; }
    .listing-title { font-size:0.9rem; font-weight:700; color:var(--gray-900); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .listing-price { font-size:1.1rem; font-weight:800; color:var(--primary); margin-bottom:8px; }
    .listing-meta  { font-size:0.75rem; color:var(--gray-400); display:flex; justify-content:space-between; }
    .listing-footer { padding:10px 14px; border-top:1px solid var(--gray-100); display:flex; gap:8px; }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="main-content" id="mainContent">
    <header class="top-header">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="header-title">Marketplace</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal('addListingModal')">+ Sell Item</button>
        <a href="notifications.html"><button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="badge"></span></button></a>
        <a href="profile.html"><div class="header-avatar" id="headerAvatar">U</div></a>
      </div>
    </header>

    <main class="page-body">
      <!-- Toolbar -->
      <div class="market-toolbar">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search items..." oninput="renderListings()" />
          <button><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
        </div>
        <select class="form-select" id="sortSelect" onchange="renderListings()" style="width:auto; padding:10px 14px;">
          <option value="newest">Newest First</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
        </select>
      </div>

      <!-- Category tabs -->
      <div class="cat-tabs">
        <button class="cat-tab active" onclick="filterCat('all', this)">All</button>
        <button class="cat-tab" onclick="filterCat('electronics', this)">📱 Electronics</button>
        <button class="cat-tab" onclick="filterCat('furniture', this)">🛋️ Furniture</button>
        <button class="cat-tab" onclick="filterCat('clothing', this)">👗 Clothing</button>
        <button class="cat-tab" onclick="filterCat('food', this)">🍽️ Food</button>
        <button class="cat-tab" onclick="filterCat('vehicles', this)">🚗 Vehicles</button>
        <button class="cat-tab" onclick="filterCat('other', this)">📦 Other</button>
      </div>

      <!-- Listings -->
      <div class="listing-grid" id="listingGrid"></div>
    </main>
  </div>
</div>

<!-- Add Listing Modal -->
<div class="modal-overlay hidden" id="addListingModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Post a New Listing</span>
      <button class="modal-close" onclick="closeModal('addListingModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" class="form-input" id="lstTitle" placeholder="What are you selling?" />
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label class="form-label">Price (PKR) *</label>
          <input type="number" class="form-input" id="lstPrice" placeholder="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="lstCategory">
            <option value="electronics">Electronics</option>
            <option value="furniture">Furniture</option>
            <option value="clothing">Clothing</option>
            <option value="food">Food</option>
            <option value="vehicles">Vehicles</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="lstDesc" placeholder="Describe your item..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Condition</label>
        <select class="form-select" id="lstCondition">
          <option>New</option><option>Like New</option><option>Good</option><option>Fair</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('addListingModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addListing()">Post Listing</button>
    </div>
  </div>
</div>

<script src="js/sidebar.js"></script>
<script src="js/app.js"></script>
<script>
'use strict';

const CAT_ICONS = { electronics:'📱', furniture:'🛋️', clothing:'👗', food:'🍽️', vehicles:'🚗', other:'📦' };
const CAT_COLORS = { electronics:'tag-blue', furniture:'tag-orange', clothing:'tag-purple', food:'tag-green', vehicles:'tag-gray', other:'tag-gray' };

let currentCat = 'all';
let listings = [
  { id:1, title:'iPhone 14 — 128GB Midnight',   price:145000, cat:'electronics', condition:'Like New', seller:'Tariq B.', time:'1h ago',   emoji:'📱', negotiable:true  },
  { id:2, title:'Sofa Set 5-Seater Brown',       price:35000,  cat:'furniture',   condition:'Good',     seller:'Sara K.',  time:'3h ago',   emoji:'🛋️', negotiable:true  },
  { id:3, title:'Men\'s Leather Jacket — L/XL',  price:8500,   cat:'clothing',    condition:'Good',     seller:'Usman T.', time:'5h ago',   emoji:'🧥', negotiable:false },
  { id:4, title:'Honda CD70 2022 Model',         price:185000, cat:'vehicles',    condition:'Like New', seller:'Bilal H.', time:'6h ago',   emoji:'🏍️', negotiable:true  },
  { id:5, title:'Homemade Biryani — Daily',      price:350,    cat:'food',        condition:'Fresh',    seller:'Nadia M.', time:'8h ago',   emoji:'🍛', negotiable:false },
  { id:6, title:'Samsung 43" Smart TV',          price:62000,  cat:'electronics', condition:'Good',     seller:'Kamran S.', time:'1d ago',  emoji:'📺', negotiable:true  },
  { id:7, title:'Kids Study Table + Chair',      price:9500,   cat:'furniture',   condition:'Good',     seller:'Faiza R.', time:'1d ago',   emoji:'🪑', negotiable:true  },
  { id:8, title:'Suzuki Alto 2019',              price:1950000,cat:'vehicles',    condition:'Good',     seller:'Ahmed K.', time:'2d ago',   emoji:'🚗', negotiable:true  },
];

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderListings();
}

function renderListings() {
  const q    = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const sort = document.getElementById('sortSelect')?.value || 'newest';

  let filtered = listings.filter(l =>
    (currentCat === 'all' || l.cat === currentCat) &&
    (!q || l.title.toLowerCase().includes(q) || l.seller.toLowerCase().includes(q))
  );

  if (sort === 'price-asc')  filtered.sort((a,b) => a.price - b.price);
  if (sort === 'price-desc') filtered.sort((a,b) => b.price - a.price);

  const grid = document.getElementById('listingGrid');

  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--gray-400);">No listings found.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(l => `
    <div class="listing-card" onclick="viewListing(${l.id})">
      <div class="listing-img">
        ${l.emoji}
        <span class="listing-badge tag ${CAT_COLORS[l.cat]}">${l.condition}</span>
      </div>
      <div class="listing-info">
        <div class="listing-title">${l.title}</div>
        <div class="listing-price">PKR ${l.price.toLocaleString()}</div>
        <div class="listing-meta">
          <span>👤 ${l.seller}</span>
          <span>${l.time}</span>
        </div>
        ${l.negotiable ? '<span style="font-size:0.72rem; color:var(--success); font-weight:600;">✓ Negotiable</span>' : ''}
      </div>
      <div class="listing-footer">
        <button class="btn btn-primary btn-sm" style="flex:1;" onclick="event.stopPropagation(); contactSeller(${l.id})">Contact Seller</button>
        <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); saveListing(${l.id})">🔖</button>
      </div>
    </div>
  `).join('');
}

function viewListing(id) {
  const l = listings.find(l => l.id === id);
  if (l) showToast(`Viewing: ${l.title}`, 'info');
}

function contactSeller(id) {
  const l = listings.find(l => l.id === id);
  if (l) showToast(`Contacting ${l.seller}...`, 'info');
}

function saveListing(id) {
  showToast('Listing saved to your wishlist!', 'success');
}

function addListing() {
  const title     = document.getElementById('lstTitle').value.trim();
  const price     = parseInt(document.getElementById('lstPrice').value);
  const cat       = document.getElementById('lstCategory').value;
  const condition = document.getElementById('lstCondition').value;

  if (!title) { showToast('Please enter a title', 'error'); return; }
  if (!price || price <= 0) { showToast('Please enter a valid price', 'error'); return; }

  const user = getUser();
  listings.unshift({
    id: Date.now(), title, price, cat, condition,
    seller: user?.fullName || 'You', time: 'just now',
    emoji: CAT_ICONS[cat] || '📦', negotiable: false
  });
  closeModal('addListingModal');
  document.getElementById('lstTitle').value = '';
  document.getElementById('lstPrice').value = '';
  renderListings();
  showToast('Listing posted successfully!', 'success');
}

document.addEventListener('DOMContentLoaded', renderListings);
</script>
</body>
</html>
