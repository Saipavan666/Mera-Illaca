 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka – Login</title>

  <!-- External CSS file -->
  <link rel="stylesheet" href="css/login.css" />
</head>

<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon"><span>🏘️</span></div>
      <h1>Mera Ilaka</h1>
      <p>Your Digital Neighborhood Platform</p>
    </div>

    <!-- Error Box (hidden by default) -->
    <div class="error-msg" id="errorMsg">⚠️ Invalid credentials. Please try again.</div>

    <!-- Login Form -->
    <form id="loginForm">

      <div class="form-group">
        <label for="email">Email / Mobile</label>
        <input type="text" id="email" placeholder="Enter your email or mobile" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button type="submit" class="btn-login">Login to My Neighbourhood</button>
    </form>

    <!-- Quick demo login -->
    <div class="divider">Quick Demo Login</div>

    <div class="demo-tiles">
      <div class="demo-tile" onclick="demoLogin('resident')">
        <div class="tile-icon">👤</div>
        <div class="tile-label">Resident</div>
      </div>
      <div class="demo-tile" onclick="demoLogin('business')">
        <div class="tile-icon">🏪</div>
        <div class="tile-label">Business</div>
      </div>
      <div class="demo-tile" onclick="demoLogin('admin')">
        <div class="tile-icon">🏢</div>
        <div class="tile-label">Admin</div>
      </div>
      <div class="demo-tile" onclick="demoLogin('moderator')">
        <div class="tile-icon">🛡️</div>
        <div class="tile-label">Moderator</div>
      </div>
    </div>

    <div class="footer-link">
      New to Mera Ilaka? <a href="#">Register Here</a>
    </div>

  </div><!-- end .card -->

  <!-- External JS file -->
  <script src="js/login.js"></script>

</body>
</html>
