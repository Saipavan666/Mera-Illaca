<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka – Marketplace</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/marketplace.css" />
</head>
<body>

  <!-- ═══════════ NAVBAR ═══════════ -->
  <nav class="navbar">
    <div class="nav-brand"><span>🏘️</span>Mera Ilaka</div>
    <div class="nav-right">
      <span id="navClock"></span>
      <div class="nav-bell">🔔<span class="dot"></span></div>
      <div class="nav-user" id="navUser">👤 Loading...</div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ═══════════ LAYOUT ═══════════ -->
  <div class="layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-section">Main</div>
      <a href="dashboard.html"><span class="icon">🏠</span> Home</a>
      <a href="announcements.html"><span class="icon">📢</span> Announcements</a>
      <a href="events.html"><span class="icon">📅</span> Events</a>
      <a href="discussions.html"><span class="icon">💬</span> Discussions</a>

      <div class="sidebar-section">Community</div>
      <a href="businesses.html"><span class="icon">🏪</span> Businesses</a>
      <a href="services.html"><span class="icon">🔧</span> Services</a>
      <a class="active"><span class="icon">🛒</span> Marketplace</a>
      <a href="lostfound.html"><span class="icon">🔍</span> Lost & Found</a>

      <div class="sidebar-section">Civic</div>
      <a href="emergency.html"><span class="icon">🚨</span> Emergency</a>
      <a href="reportissue.html"><span class="icon">📝</span> Report Issue</a>
      <a><span class="icon">👤</span> My Profile</a>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="main">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h2>🛒 Marketplace</h2>
          <p>Buy and sell items with your neighbours — safely and locally.</p>
        </div>
        <button class="btn-post" onclick="openSellModal()">+ Sell Item</button>
      </div>

      <!-- Search Bar -->
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search items..."
          oninput="searchItems()"
        />
      </div>

      <!-- Category Filter Buttons -->
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterItems('all', this)">All</button>
        <button class="filter-btn" onclick="filterItems('electronics', this)">📱 Electronics</button>
        <button class="filter-btn" onclick="filterItems('furniture', this)">🛋️ Furniture</button>
        <button class="filter-btn" onclick="filterItems('clothing', this)">👗 Clothing</button>
        <button class="filter-btn" onclick="filterItems('books', this)">📚 Books</button>
        <button class="filter-btn" onclick="filterItems('other', this)">📦 Other</button>
      </div>

      <!-- Items Grid -->
      <div class="items-grid" id="itemsGrid">
        <!-- Cards built by marketplace.js -->
      </div>

    </main>
  </div>

  <!-- ═══════════ SELL ITEM MODAL ═══════════ -->
  <div class="modal-overlay" id="sellModal">
    <div class="modal">
      <h3>🛒 List an Item for Sale</h3>

      <input type="text"   id="itemName"    placeholder="Item name..."               />
      <input type="number" id="itemPrice"   placeholder="Price (₹)..."               />
      <input type="text"   id="itemContact" placeholder="Your phone number..."        />

      <select id="itemCategory">
        <option value="electronics">📱 Electronics</option>
        <option value="furniture">🛋️ Furniture</option>
        <option value="clothing">👗 Clothing</option>
        <option value="books">📚 Books</option>
        <option value="other">📦 Other</option>
      </select>

      <select id="itemCondition">
        <option value="New">✨ New</option>
        <option value="Like New">👍 Like New</option>
        <option value="Good">✅ Good</option>
        <option value="Used">📦 Used</option>
      </select>

      <textarea id="itemDesc" rows="3" placeholder="Describe your item..."></textarea>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeSellModal()">Cancel</button>
        <button class="btn-submit" onclick="submitItem()">List Item</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/marketplace.js"></script>
</body>
</html>
