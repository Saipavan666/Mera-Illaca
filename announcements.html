<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka – Announcements</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/announcements.css" />
</head>
<body>

  <!-- ═══════════ NAVBAR (same as dashboard) ═══════════ -->
  <nav class="navbar">
    <div class="nav-brand"><span>🏘️</span>Mera Ilaka</div>
    <div class="nav-right">
      <span id="navClock"></span>
      <div class="nav-bell">🔔<span class="dot"></span></div>
      <div class="nav-user" id="navUser">👤 Loading...</div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ═══════════ LAYOUT (sidebar + main) ═══════════ -->
  <div class="layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-section">Main</div>
      <a href="dashboard.html"><span class="icon">🏠</span> Home</a>
      <a class="active"><span class="icon">📢</span> Announcements</a>
      <a href="events.html"><span class="icon">📅</span> Events</a>
      <a href="discussions.html"><span class="icon">💬</span> Discussions</a>

      <div class="sidebar-section">Community</div>
      <a href="businesses.html"><span class="icon">🏪</span> Businesses</a>
      <a href="services.html"><span class="icon">🔧</span> Services</a>
      <a href="marketplace.html"><span class="icon">🛒</span> Marketplace</a>
      <a href="lostfound.html"><span class="icon">🔍</span> Lost & Found</a>

      <div class="sidebar-section">Civic</div>
      <a href="emergency.html"><span class="icon">🚨</span> Emergency</a>
      <a><span class="icon">📝</span> Report Issue</a>
      <a><span class="icon">👤</span> My Profile</a>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="main">

      <!-- Page Title -->
      <div class="page-header">
        <div>
          <h2>📢 Announcements</h2>
          <p>Stay updated with the latest news from your neighbourhood.</p>
        </div>
        <!-- Only admins see this button (shown/hidden by JS) -->
        <button class="btn-post" id="postBtn" onclick="openPostModal()" style="display:none;">
          + Post Announcement
        </button>
      </div>

      <!-- Filter Buttons (click to filter by category) -->
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterAnn('all', this)">All</button>
        <button class="filter-btn" onclick="filterAnn('maintenance', this)">🔧 Maintenance</button>
        <button class="filter-btn" onclick="filterAnn('safety', this)">🛡️ Safety</button>
        <button class="filter-btn" onclick="filterAnn('event', this)">🎉 Event</button>
        <button class="filter-btn" onclick="filterAnn('civic', this)">🏛️ Civic</button>
      </div>

      <!-- Announcements List (cards) -->
      <div class="ann-list" id="annList">
        <!-- These cards are generated by JS below -->
      </div>

    </main>
  </div>

  <!-- ═══════════ POST ANNOUNCEMENT MODAL (for Admin) ═══════════ -->
  <div class="modal-overlay" id="postModal">
    <div class="modal">
      <h3>📢 Post New Announcement</h3>

      <!-- Title input -->
      <input type="text" id="annTitle" placeholder="Announcement title..." />

      <!-- Category select dropdown -->
      <select id="annCategory">
        <option value="maintenance">🔧 Maintenance</option>
        <option value="safety">🛡️ Safety</option>
        <option value="event">🎉 Event</option>
        <option value="civic">🏛️ Civic</option>
      </select>

      <!-- Details textarea -->
      <textarea id="annDetails" rows="4" placeholder="Write the full announcement details..."></textarea>

      <!-- Buttons -->
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closePostModal()">Cancel</button>
        <button class="btn-submit" onclick="submitAnnouncement()">Post</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Load JS files -->
  <script src="js/announcements.js"></script>
</body>
</html>
