<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka — Business Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .dir-toolbar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .dir-search  { flex:1; min-width:200px; display:flex; align-items:center; background:white; border:1.5px solid var(--gray-200); border-radius:var(--radius-sm); overflow:hidden; }
    .dir-search input  { flex:1; padding:10px 14px; border:none; outline:none; font-family:var(--font); font-size:0.9rem; }
    .dir-search button { padding:10px 14px; background:var(--primary); border:none; cursor:pointer; color:white; }

    .cat-chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .cat-chip  { padding:6px 14px; border-radius:20px; background:white; border:1.5px solid var(--gray-200); font-size:0.8rem; font-weight:600; cursor:pointer; transition:all var(--transition); }
    .cat-chip.active { background:var(--primary); border-color:var(--primary); color:white; }

    .biz-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .biz-card { background:white; border-radius:var(--radius); border:1px solid var(--gray-200); overflow:hidden; transition:all var(--transition); }
    .biz-card:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
    .biz-cover { height:100px; display:flex; align-items:center; justify-content:center; font-size:3rem; }
    .biz-body  { padding:16px; }
    .biz-name  { font-size:1rem; font-weight:700; color:var(--gray-900); margin-bottom:4px; }
    .biz-cat   { font-size:0.78rem; color:var(--gray-500); margin-bottom:8px; }
    .biz-desc  { font-size:0.85rem; color:var(--gray-600); line-height:1.5; margin-bottom:12px; }
    .biz-footer{ padding:12px 16px; border-top:1px solid var(--gray-100); display:flex; align-items:center; justify-content:space-between; }
    .rating    { display:flex; align-items:center; gap:4px; font-size:0.85rem; font-weight:600; color:var(--warning); }
    .biz-hours { font-size:0.75rem; color:var(--gray-400); }
    .biz-open  { color:var(--success); font-weight:600; }
    .biz-closed{ color:var(--error);   font-weight:600; }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="main-content" id="mainContent">
    <header class="top-header">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="header-title">Business Directory</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal('addBizModal')">+ Add Business</button>
        <a href="profile.html"><div class="header-avatar" id="headerAvatar">U</div></a>
      </div>
    </header>

    <main class="page-body">
      <div class="dir-toolbar">
        <div class="dir-search">
          <input type="text" id="bizSearch" placeholder="Search businesses..." oninput="renderBiz()" />
          <button><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
        </div>
      </div>
      <div class="cat-chips">
        <button class="cat-chip active" onclick="bizFilter('all', this)">All</button>
        <button class="cat-chip" onclick="bizFilter('food', this)">🍽️ Food & Dining</button>
        <button class="cat-chip" onclick="bizFilter('retail', this)">🛍️ Retail</button>
        <button class="cat-chip" onclick="bizFilter('health', this)">🏥 Health</button>
        <button class="cat-chip" onclick="bizFilter('education', this)">📚 Education</button>
        <button class="cat-chip" onclick="bizFilter('salon', this)">💈 Salon</button>
        <button class="cat-chip" onclick="bizFilter('gym', this)">🏋️ Gym</button>
      </div>
      <div class="biz-grid" id="bizGrid"></div>
    </main>
  </div>
</div>

<!-- Add Business Modal -->
<div class="modal-overlay hidden" id="addBizModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Your Business</span>
      <button class="modal-close" onclick="closeModal('addBizModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Business Name *</label><input type="text" class="form-input" id="newBizName" placeholder="e.g. Ahmed's Restaurant" /></div>
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-select" id="newBizCat">
          <option value="food">Food & Dining</option>
          <option value="retail">Retail</option>
          <option value="health">Health</option>
          <option value="education">Education</option>
          <option value="salon">Salon</option>
          <option value="gym">Gym</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="newBizDesc" placeholder="Brief description..."></textarea></div>
      <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" id="newBizPhone" placeholder="+92 300 0000000" /></div>
      <div class="form-group"><label class="form-label">Address</label><input type="text" class="form-input" id="newBizAddr" placeholder="Street address" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('addBizModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addBusiness()">Add Business</button>
    </div>
  </div>
</div>

<script src="js/sidebar.js"></script>
<script src="js/app.js"></script>
<script>
'use strict';

const BIZ_COVERS = { food:'#fff7ed', retail:'#eff6ff', health:'#f0fdf4', education:'#faf5ff', salon:'#fdf2f8', gym:'#fff5f5' };
const BIZ_EMOJIS = { food:'🍽️', retail:'🛍️', health:'🏥', education:'📚', salon:'💈', gym:'🏋️' };

let activeCat = 'all';
let businesses = [
  { id:1, name:'Naan & Karahi',         cat:'food',      desc:'Best Desi food in the area. Fresh naan and karahi cooked to order.',       phone:'0300-1234567', addr:'Main Blvd, Block C', rating:4.8, reviews:124, open:true  },
  { id:2, name:'Al-Fatah Superstore',   cat:'retail',    desc:'Complete grocery and household items. Delivery available within DHA.',      phone:'0301-2345678', addr:'Phase 5 Market',   rating:4.5, reviews:87,  open:true  },
  { id:3, name:'City Medical Centre',   cat:'health',    desc:'General physician, lab tests, and pharmacy. 24/7 emergency services.',       phone:'0302-3456789', addr:'Sector C-3',       rating:4.7, reviews:203, open:true  },
  { id:4, name:'Bright Future Academy', cat:'education', desc:'Tutoring for O/A Levels. Experienced teachers, small class sizes.',         phone:'0303-4567890', addr:'Street 12, F-8',   rating:4.6, reviews:58,  open:false },
  { id:5, name:'Glamour Salon & Spa',   cat:'salon',     desc:'Premium haircuts, threading, and beauty services for men and women.',        phone:'0304-5678901', addr:'Phase 5 Market',   rating:4.4, reviews:91,  open:true  },
  { id:6, name:'Power Zone Gym',        cat:'gym',       desc:'State-of-the-art gym with certified trainers. Monthly and yearly packages.', phone:'0305-6789012', addr:'Main Boulevard',   rating:4.3, reviews:67,  open:true  },
  { id:7, name:'Zaiqa Restaurant',      cat:'food',      desc:'Steaks, burgers, and Pakistani fusion cuisine.',                             phone:'0306-7890123', addr:'Sector B-2',       rating:4.2, reviews:44,  open:false },
  { id:8, name:'TechZone Electronics',  cat:'retail',    desc:'Mobiles, laptops, and accessories at competitive prices.',                   phone:'0307-8901234', addr:'Shaheen Market',   rating:4.1, reviews:33,  open:true  },
];

function bizFilter(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBiz();
}

function renderBiz() {
  const q = (document.getElementById('bizSearch')?.value || '').toLowerCase();
  let list = businesses.filter(b =>
    (activeCat === 'all' || b.cat === activeCat) &&
    (!q || b.name.toLowerCase().includes(q) || b.desc.toLowerCase().includes(q))
  );

  const grid = document.getElementById('bizGrid');
  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--gray-400);">No businesses found.</div>`;
    return;
  }

  grid.innerHTML = list.map(b => `
    <div class="biz-card">
      <div class="biz-cover" style="background:${BIZ_COVERS[b.cat] || '#f3f4f6'}">${BIZ_EMOJIS[b.cat] || '🏢'}</div>
      <div class="biz-body">
        <div class="biz-name">${b.name}</div>
        <div class="biz-cat">${BIZ_EMOJIS[b.cat]} ${b.cat.charAt(0).toUpperCase()+b.cat.slice(1)} · 📍 ${b.addr}</div>
        <div class="biz-desc">${b.desc}</div>
        <div style="font-size:0.8rem; color:var(--gray-500);">📞 ${b.phone}</div>
      </div>
      <div class="biz-footer">
        <div class="rating">⭐ ${b.rating} <span style="font-size:0.72rem; color:var(--gray-400); font-weight:400;">(${b.reviews})</span></div>
        <span class="${b.open ? 'biz-open' : 'biz-closed'} biz-hours">${b.open ? '● Open' : '● Closed'}</span>
      </div>
      <div style="padding:0 16px 16px; display:flex; gap:8px;">
        <button class="btn btn-primary btn-sm" style="flex:1;" onclick="showToast('Calling ${b.phone}...','info')">📞 Call</button>
        <button class="btn btn-secondary btn-sm" onclick="showToast('Opening directions...','info')">🗺️ Directions</button>
        <button class="btn btn-secondary btn-sm" onclick="showToast('Review submitted!','success')">⭐ Review</button>
      </div>
    </div>
  `).join('');
}

function addBusiness() {
  const name = document.getElementById('newBizName').value.trim();
  const cat  = document.getElementById('newBizCat').value;
  const desc = document.getElementById('newBizDesc').value.trim();
  const phone= document.getElementById('newBizPhone').value.trim();
  const addr = document.getElementById('newBizAddr').value.trim();
  if (!name) { showToast('Please enter a business name','error'); return; }
  businesses.unshift({ id:Date.now(), name, cat, desc:desc||'No description provided.', phone:phone||'—', addr:addr||'—', rating:0, reviews:0, open:true });
  closeModal('addBizModal');
  renderBiz();
  showToast('Business added successfully!','success');
}

document.addEventListener('DOMContentLoaded', renderBiz);
</script>
</body>
</html>
