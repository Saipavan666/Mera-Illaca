<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka — Community Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .feed-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }

    /* Compose box */
    .compose-box { background: white; border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 20px; margin-bottom: 20px; }
    .compose-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .compose-input { flex: 1; padding: 12px 16px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-family: var(--font); font-size: 0.9rem; resize: none; outline: none; min-height: 80px; transition: border-color var(--transition); }
    .compose-input:focus { border-color: var(--primary); }
    .compose-actions { display: flex; gap: 8px; justify-content: space-between; align-items: center; }
    .compose-type-btns { display: flex; gap: 6px; }
    .type-btn { padding: 6px 12px; background: var(--gray-100); border: none; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all var(--transition); }
    .type-btn.selected { background: var(--primary); color: white; }

    /* Post card */
    .post-card { background: white; border-radius: var(--radius); border: 1px solid var(--gray-200); margin-bottom: 16px; overflow: hidden; }
    .post-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px 0; }
    .post-body { padding: 12px 20px 16px; }
    .post-text { font-size: 0.92rem; color: var(--gray-800); line-height: 1.65; }
    .post-image { width: 100%; background: var(--gray-100); height: 200px; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 12px 0; }
    .post-footer { padding: 0 20px 16px; display: flex; align-items: center; gap: 6px; border-top: 1px solid var(--gray-100); padding-top: 12px; }
    .post-action-btn { display: flex; align-items: center; gap: 5px; padding: 7px 12px; background: none; border: 1px solid var(--gray-200); border-radius: 20px; font-size: 0.82rem; font-weight: 500; cursor: pointer; color: var(--gray-600); transition: all var(--transition); }
    .post-action-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .post-action-btn.liked { background: #fff5f5; border-color: var(--error); color: var(--error); }

    /* Trending topics */
    .trend-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gray-100); cursor: pointer; }
    .trend-item:last-child { border-bottom: none; }
    .trend-tag { font-size: 0.87rem; font-weight: 600; color: var(--primary); }
    .trend-count { font-size: 0.78rem; color: var(--gray-400); }

    /* Filters */
    .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--gray-200); background: white; font-size: 0.82rem; font-weight: 600; color: var(--gray-600); cursor: pointer; transition: all var(--transition); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

    @media (max-width: 768px) { .feed-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="main-content" id="mainContent">
    <header class="top-header">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="header-title">Community Feed</h1>
      <div class="header-actions">
        <a href="notifications.html"><button class="icon-btn" aria-label="Notifications"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="badge"></span></button></a>
        <a href="profile.html"><div class="header-avatar" id="headerAvatar">U</div></a>
      </div>
    </header>

    <main class="page-body">
      <div class="feed-grid">
        <!-- Main feed -->
        <div>
          <!-- Compose -->
          <div class="compose-box">
            <div class="compose-row">
              <div class="avatar avatar-md" id="composeAvatar">U</div>
              <textarea class="compose-input" id="composeText" placeholder="What's happening in your neighborhood?" rows="3"></textarea>
            </div>
            <div class="compose-actions">
              <div class="compose-type-btns">
                <button class="type-btn selected" data-type="update"  onclick="selectType(this)">📝 Update</button>
                <button class="type-btn"          data-type="question" onclick="selectType(this)">❓ Question</button>
                <button class="type-btn"          data-type="alert"    onclick="selectType(this)">🚨 Alert</button>
                <button class="type-btn"          data-type="event"    onclick="selectType(this)">📅 Event</button>
              </div>
              <button class="btn btn-primary btn-sm" onclick="submitPost()">Post</button>
            </div>
          </div>

          <!-- Filter bar -->
          <div class="filter-row">
            <button class="filter-btn active" onclick="filterPosts('all', this)">All</button>
            <button class="filter-btn" onclick="filterPosts('update', this)">Updates</button>
            <button class="filter-btn" onclick="filterPosts('question', this)">Questions</button>
            <button class="filter-btn" onclick="filterPosts('alert', this)">Alerts</button>
            <button class="filter-btn" onclick="filterPosts('event', this)">Events</button>
          </div>

          <!-- Feed -->
          <div id="feedContainer"></div>
        </div>

        <!-- Sidebar -->
        <div>
          <!-- Trending -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header"><div class="card-title">🔥 Trending Topics</div></div>
            <div class="card-body">
              <div class="trend-item"><span class="trend-tag">#CleanupDrive</span><span class="trend-count">48 posts</span></div>
              <div class="trend-item"><span class="trend-tag">#PowerOutage</span><span class="trend-count">31 posts</span></div>
              <div class="trend-item"><span class="trend-tag">#NewRestaurant</span><span class="trend-count">22 posts</span></div>
              <div class="trend-item"><span class="trend-tag">#ParkRepair</span><span class="trend-count">18 posts</span></div>
              <div class="trend-item"><span class="trend-tag">#LocalMarket</span><span class="trend-count">14 posts</span></div>
            </div>
          </div>

          <!-- Active neighbors -->
          <div class="card">
            <div class="card-header"><div class="card-title">👥 Active Neighbors</div></div>
            <div class="card-body">
              <div id="activeNeighborsList"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/sidebar.js"></script>
<script src="js/app.js"></script>
<script>
'use strict';

const POSTS = [
  { id:1, type:'alert',    author:'Tariq B.', initials:'TB', time:'10 min ago', text:'⚠️ Water supply will be off in Block C tomorrow morning from 8-11am. Please store water tonight.', likes:24, comments:7,  liked:false },
  { id:2, type:'update',   author:'Sara K.',  initials:'SK', time:'35 min ago', text:'The new playground equipment at Central Park has finally been installed! Kids are going to love it 🎠', likes:51, comments:14, liked:false, hasImage:true, imageEmoji:'🎠' },
  { id:3, type:'question', author:'Ali H.',   initials:'AH', time:'2h ago',     text:'Does anyone know a good reliable electrician near DHA Phase 5? Need urgent help with a tripping circuit board.', likes:3,  comments:12, liked:false },
  { id:4, type:'event',    author:'Admin',    initials:'AD', time:'3h ago',     text:'📅 Reminder: Community Clean-up Drive is this Saturday at 8am. Meet at Main Gate. Gloves and bags provided!', likes:38, comments:9,  liked:false },
  { id:5, type:'update',   author:'Nadia M.', initials:'NM', time:'5h ago',     text:'Spotted a stray puppy near the park entrance — brown, small. Anyone missing their pet? 🐶', likes:19, comments:21, liked:false },
  { id:6, type:'question', author:'Kamran S.', initials:'KS', time:'1d ago',    text:'Is the Friday market still happening this week? Haven\'t seen any announcement lately.', likes:6, comments:15, liked:false },
];

let currentFilter = 'all';
let selectedType  = 'update';
let posts = [...POSTS];

function selectType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedType = btn.dataset.type;
}

function filterPosts(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function toggleLike(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  post.liked = !post.liked;
  post.likes += post.liked ? 1 : -1;
  renderFeed();
}

function submitPost() {
  const text = document.getElementById('composeText').value.trim();
  if (!text) { showToast('Please write something first!', 'error'); return; }
  const user = getUser();
  const newPost = {
    id: Date.now(),
    type: selectedType,
    author: user?.fullName || 'You',
    initials: getInitials(user?.fullName || 'Y'),
    time: 'just now',
    text,
    likes: 0,
    comments: 0,
    liked: false
  };
  posts.unshift(newPost);
  document.getElementById('composeText').value = '';
  renderFeed();
  showToast('Post shared with your neighborhood!', 'success');
}

const TYPE_ICONS = { update:'📝', question:'❓', alert:'🚨', event:'📅' };
const TYPE_TAGS  = { update:'tag-blue', question:'tag-orange', alert:'tag-red', event:'tag-green' };
const TYPE_LABELS = { update:'Update', question:'Question', alert:'Alert', event:'Event' };

function renderFeed() {
  const container = document.getElementById('feedContainer');
  const filtered = currentFilter === 'all' ? posts : posts.filter(p => p.type === currentFilter);

  if (!filtered.length) {
    container.innerHTML = `<div class="card" style="padding:32px; text-align:center; color:var(--gray-400);">No posts found.</div>`;
    return;
  }

  container.innerHTML = filtered.map(p => `
    <div class="post-card" id="post-${p.id}">
      <div class="post-header">
        <div class="avatar avatar-md" style="background:${stringToColor(p.author)};">${p.initials}</div>
        <div style="flex:1;">
          <div style="font-weight:600; font-size:0.9rem;">${p.author}</div>
          <div style="font-size:0.75rem; color:var(--gray-400);">${p.time}</div>
        </div>
        <span class="tag ${TYPE_TAGS[p.type]}">${TYPE_ICONS[p.type]} ${TYPE_LABELS[p.type]}</span>
      </div>
      <div class="post-body">
        <div class="post-text">${p.text}</div>
        ${p.hasImage ? `<div class="post-image">${p.imageEmoji}</div>` : ''}
      </div>
      <div class="post-footer">
        <button class="post-action-btn ${p.liked ? 'liked' : ''}" onclick="toggleLike(${p.id})">
          ${p.liked ? '❤️' : '🤍'} ${p.likes}
        </button>
        <button class="post-action-btn" onclick="showToast('Comments coming soon!', 'info')">
          💬 ${p.comments}
        </button>
        <button class="post-action-btn" onclick="showToast('Link copied!', 'success')">
          🔗 Share
        </button>
      </div>
    </div>
  `).join('');
}

function stringToColor(str) {
  const colors = ['#f97316','#3b82f6','#22c55e','#a855f7','#06b6d4','#f59e0b','#ef4444'];
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

const NEIGHBORS = [
  { name:'Ahmed K.',  initials:'AK', posts:12 },
  { name:'Sara M.',   initials:'SM', posts:9  },
  { name:'Ali R.',    initials:'AR', posts:7  },
  { name:'Nadia T.',  initials:'NT', posts:5  },
];

function renderNeighbors() {
  document.getElementById('activeNeighborsList').innerHTML = NEIGHBORS.map(n => `
    <div style="display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--gray-100);">
      <div class="avatar avatar-sm" style="background:${stringToColor(n.name)};">${n.initials}</div>
      <div style="flex:1; font-size:0.87rem; font-weight:500;">${n.name}</div>
      <span class="text-xs text-muted">${n.posts} posts</span>
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  const user = getUser();
  const avatar = document.getElementById('composeAvatar');
  if (avatar) avatar.textContent = getInitials(user?.fullName || 'U');
  renderFeed();
  renderNeighbors();
});
</script>
</body>
</html>
