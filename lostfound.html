<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka – Lost & Found</title>

  <!-- Reuse dashboard base styles -->
  <link rel="stylesheet" href="css/dashboard.css" />
  <!-- Our own lost & found styles -->
  <link rel="stylesheet" href="css/lostfound.css" />
</head>
<body>

  <!-- ═══════════ NAVBAR ═══════════ -->
  <nav class="navbar">
    <div class="nav-brand"><span>🏘️</span>Mera Ilaka</div>
    <div class="nav-right">
      <span id="navClock"></span>
      <div class="nav-bell">🔔<span class="dot"></span></div>
      <div class="nav-user" id="navUser">👤 Loading...</div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ═══════════ LAYOUT ═══════════ -->
  <div class="layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-section">Main</div>
      <a href="dashboard.html"><span class="icon">🏠</span> Home</a>
      <a href="announcements.html"><span class="icon">📢</span> Announcements</a>
      <a href="events.html"><span class="icon">📅</span> Events</a>
      <a href="discussions.html"><span class="icon">💬</span> Discussions</a>

      <div class="sidebar-section">Community</div>
      <a href="businesses.html"><span class="icon">🏪</span> Businesses</a>
      <a href="services.html"><span class="icon">🔧</span> Services</a>
      <a href="marketplace.html"><span class="icon">🛒</span> Marketplace</a>
      <a class="active"><span class="icon">🔍</span> Lost & Found</a>

      <div class="sidebar-section">Civic</div>
      <a href="emergency.html"><span class="icon">🚨</span> Emergency</a>
      <a href="reportissue.html"><span class="icon">📝</span> Report Issue</a>
      <a><span class="icon">👤</span> My Profile</a>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="main">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h2>🔍 Lost & Found</h2>
          <p>Report a lost item or claim something you found in the neighbourhood.</p>
        </div>
        <!-- Two buttons side by side: Lost and Found -->
        <div class="header-btns">
          <button class="btn-lost"  onclick="openModal('lost')">😢 I Lost Something</button>
          <button class="btn-found" onclick="openModal('found')">🎉 I Found Something</button>
        </div>
      </div>

      <!-- Stats bar: quick count of lost vs found -->
      <div class="stats-bar" id="statsBar">
        <!-- Filled by JS -->
      </div>

      <!-- Filter Buttons -->
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterPosts('all', this)">All</button>
        <button class="filter-btn" onclick="filterPosts('lost', this)">😢 Lost</button>
        <button class="filter-btn" onclick="filterPosts('found', this)">🎉 Found</button>
        <button class="filter-btn" onclick="filterPosts('resolved', this)">✅ Resolved</button>
      </div>

      <!-- Search Bar -->
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search by item name or location..."
          oninput="searchPosts()"
        />
      </div>

      <!-- Posts List -->
      <div class="posts-list" id="postsList">
        <!-- Cards built by lostfound.js -->
      </div>

    </main>
  </div>

  <!-- ═══════════ POST MODAL (used for both Lost and Found) ═══════════ -->
  <div class="modal-overlay" id="postModal">
    <div class="modal">

      <!-- Title changes based on Lost or Found -->
      <h3 id="modalTitle">😢 Report Lost Item</h3>

      <!-- Item name -->
      <input type="text" id="postItem"     placeholder="Item name  e.g. Blue Wallet" />

      <!-- Where it was lost/found -->
      <input type="text" id="postLocation" placeholder="Location  e.g. Near Park Gate" />

      <!-- Date it was lost/found -->
      <input type="date" id="postDate" />

      <!-- Contact number -->
      <input type="text" id="postContact"  placeholder="Your contact number..." />

      <!-- Extra description -->
      <textarea id="postDesc" rows="3" placeholder="Describe the item (colour, size, any marks...)"></textarea>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-submit" onclick="submitPost()">Post</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="js/lostfound.js"></script>
</body>
</html>
