<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka – Businesses</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/businesses.css" />
</head>
<body>

  <!-- ═══════════ NAVBAR ═══════════ -->
  <nav class="navbar">
    <div class="nav-brand"><span>🏘️</span>Mera Ilaka</div>
    <div class="nav-right">
      <span id="navClock"></span>
      <div class="nav-bell">🔔<span class="dot"></span></div>
      <div class="nav-user" id="navUser">👤 Loading...</div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ═══════════ LAYOUT ═══════════ -->
  <div class="layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-section">Main</div>
      <a href="dashboard.html"><span class="icon">🏠</span> Home</a>
      <a href="announcements.html"><span class="icon">📢</span> Announcements</a>
      <a href="events.html"><span class="icon">📅</span> Events</a>
      <a href="discussions.html"><span class="icon">💬</span> Discussions</a>

      <div class="sidebar-section">Community</div>
      <a class="active"><span class="icon">🏪</span> Businesses</a>
      <a href="services.html"><span class="icon">🔧</span> Services</a>
      <a href="marketplace.html"><span class="icon">🛒</span> Marketplace</a>
      <a href="lostfound.html"><span class="icon">🔍</span> Lost & Found</a>

      <div class="sidebar-section">Civic</div>
      <a href="emergency.html"><span class="icon">🚨</span> Emergency</a>
      <a href="reportissue.html"><span class="icon">📝</span> Report Issue</a>
      <a><span class="icon">👤</span> My Profile</a>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="main">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h2>🏪 Local Businesses</h2>
          <p>Discover and support businesses in your neighbourhood.</p>
        </div>
        <button class="btn-post" onclick="openAddModal()">+ Add Business</button>
      </div>

      <!-- Search Bar -->
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search businesses by name or type..."
          oninput="searchBusinesses()"
        />
      </div>

      <!-- Category Filter Buttons -->
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterBiz('all', this)">All</button>
        <button class="filter-btn" onclick="filterBiz('food', this)">🍽️ Food</button>
        <button class="filter-btn" onclick="filterBiz('medical', this)">🏥 Medical</button>
        <button class="filter-btn" onclick="filterBiz('shop', this)">🛍️ Shop</button>
        <button class="filter-btn" onclick="filterBiz('service', this)">🔧 Service</button>
        <button class="filter-btn" onclick="filterBiz('education', this)">📚 Education</button>
      </div>

      <!-- Business Cards Grid -->
      <div class="biz-grid" id="bizGrid">
        <!-- Cards built by businesses.js -->
      </div>

    </main>
  </div>

  <!-- ═══════════ ADD BUSINESS MODAL ═══════════ -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>🏪 Add Your Business</h3>

      <input type="text"  id="bizName"    placeholder="Business name..."         />
      <input type="text"  id="bizType"    placeholder="Type  e.g. Restaurant"    />
      <input type="text"  id="bizPhone"   placeholder="Phone number..."           />
      <input type="text"  id="bizAddress" placeholder="Address / Block..."        />
      <input type="text"  id="bizHours"   placeholder="Hours  e.g. 9 AM – 9 PM"  />

      <select id="bizCategory">
        <option value="food">🍽️ Food</option>
        <option value="medical">🏥 Medical</option>
        <option value="shop">🛍️ Shop</option>
        <option value="service">🔧 Service</option>
        <option value="education">📚 Education</option>
      </select>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
        <button class="btn-submit" onclick="submitBusiness()">Add</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/businesses.js"></script>
</body>
</html>
