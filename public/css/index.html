<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka – Digital Neighbourhood Platform</title>

  <!-- ── Login page CSS (used on this landing page too) ── -->
  <link rel="stylesheet" href="login.css" />

  <style>
    /* ── Extra styles only for this index/landing page ── */

    /* Full-screen green gradient background */
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #a5d6a7 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    /* White card in the center */
    .landing-card {
      background: #fff;
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.13);
      text-align: center;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo circle */
    .logo-circle {
      width: 80px;
      height: 80px;
      background: #2e7d32;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(46,125,50,0.35);
    }

    .landing-card h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1b5e20;
      margin-bottom: 6px;
    }

    .landing-card .tagline {
      font-size: 14px;
      color: #777;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    /* Divider line */
    .divider-line {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 24px 0;
    }

    /* Section heading inside card */
    .section-title {
      font-size: 12px;
      font-weight: 800;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    /* Page link buttons */
    .page-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .page-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 10px;
      border: 1.8px solid #e0e0e0;
      border-radius: 12px;
      text-decoration: none;
      color: #444;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      background: #fafafa;
    }

    .page-btn .btn-icon { font-size: 26px; }

    .page-btn:hover {
      border-color: #2e7d32;
      background: #f1f8e9;
      color: #2e7d32;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(46,125,50,0.15);
    }

    /* Primary green "Go to Login" button */
    .btn-main {
      display: block;
      width: 100%;
      padding: 13px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(46,125,50,0.3);
    }
    .btn-main:hover { background: #1b5e20; }

    /* Asset list (CSS/JS files) */
    .asset-list {
      text-align: left;
      background: #f8f8f8;
      border-radius: 10px;
      padding: 14px 18px;
    }
    .asset-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      font-size: 13px;
      color: #555;
      border-bottom: 1px solid #efefef;
    }
    .asset-item:last-child { border-bottom: none; }
    .asset-item .file-icon { font-size: 16px; }
    .asset-item .file-name { font-weight: 600; color: #333; }
    .asset-item .file-desc { color: #999; font-size: 11px; margin-left: auto; }

    /* Footer */
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

  <div class="landing-card">

    <!-- Logo -->
    <div class="logo-circle">🏘️</div>
    <h1>Mera Ilaka</h1>
    <p class="tagline">
      Your Digital Neighbourhood Platform<br>
      Connecting residents, businesses &amp; communities
    </p>

    <!-- ── MAIN ENTRY POINT ── -->
    <a href="login.html" class="btn-main">🚀 Enter Mera Ilaka (Login)</a>

    <hr class="divider-line" />

    <!-- ── PAGE LINKS ── -->
    <div class="section-title">All Pages</div>
    <div class="page-links">

      <a href="login.html" class="page-btn">
        <span class="btn-icon">🔐</span>
        Login Page
      </a>

      <a href="dashboard.html" class="page-btn">
        <span class="btn-icon">🏠</span>
        Dashboard
      </a>

      <a href="services.html" class="page-btn">
        <span class="btn-icon">🔧</span>
        Services
      </a>

      <!-- Placeholder links for future pages -->
      <a href="#" class="page-btn" style="opacity:0.45;cursor:not-allowed;">
        <span class="btn-icon">🛒</span>
        Marketplace<br><small style="font-size:10px;color:#aaa">Coming Soon</small>
      </a>

      <a href="#" class="page-btn" style="opacity:0.45;cursor:not-allowed;">
        <span class="btn-icon">📅</span>
        Events<br><small style="font-size:10px;color:#aaa">Coming Soon</small>
      </a>

      <a href="#" class="page-btn" style="opacity:0.45;cursor:not-allowed;">
        <span class="btn-icon">📢</span>
        Announcements<br><small style="font-size:10px;color:#aaa">Coming Soon</small>
      </a>

    </div>

  </div><!-- end .landing-card -->

  <div class="footer">
    Mera Ilaka &copy; 2025 · Digital Neighbourhood Platform
  </div>

  <!-- ── Login JS loaded here so "already logged in" check works ── -->
  <script>
    // If user is already logged in, skip login and go straight to dashboard
    window.addEventListener("DOMContentLoaded", function () {
      const data = sessionStorage.getItem("loggedUser");
      if (data) {
        // Already logged in – show a note on the main button
        const btn = document.querySelector(".btn-main");
        if (btn) {
          const user = JSON.parse(data);
          btn.textContent = "🏠 Go to Dashboard (" + user.name + ")";
          btn.href = "dashboard.html";
        }
      }
    });
  </script>

</body>
</html>
