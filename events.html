<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mera Ilaka – Events</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/events.css" />
</head>
<body>

  <!-- ═══════════ NAVBAR ═══════════ -->
  <nav class="navbar">
    <div class="nav-brand"><span>🏘️</span>Mera Ilaka</div>
    <div class="nav-right">
      <span id="navClock"></span>
      <div class="nav-bell">🔔<span class="dot"></span></div>
      <div class="nav-user" id="navUser">👤 Loading...</div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ═══════════ LAYOUT ═══════════ -->
  <div class="layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-section">Main</div>
      <a href="dashboard.html"><span class="icon">🏠</span> Home</a>
      <a href="announcements.html"><span class="icon">📢</span> Announcements</a>
      <a class="active"><span class="icon">📅</span> Events</a>
      <a href="discussions.html"><span class="icon">💬</span> Discussions</a>

      <div class="sidebar-section">Community</div>
      <a href="businesses.html"><span class="icon">🏪</span> Businesses</a>
      <a href="services.html"><span class="icon">🔧</span> Services</a>
      <a href="marketplace.html"><span class="icon">🛒</span> Marketplace</a>
      <a href="lostfound.html"><span class="icon">🔍</span> Lost & Found</a>

      <div class="sidebar-section">Civic</div>
      <a><span class="icon">🚨</span> Emergency</a>
      <a><span class="icon">📝</span> Report Issue</a>
      <a><span class="icon">👤</span> My Profile</a>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="main">

      <!-- Page Title -->
      <div class="page-header">
        <div>
          <h2>📅 Upcoming Events</h2>
          <p>Discover and join events happening in your neighbourhood.</p>
        </div>
        <!-- Admin only button -->
        <button class="btn-post" id="addEventBtn" onclick="openEventModal()" style="display:none;">
          + Add Event
        </button>
      </div>

      <!-- Filter Buttons -->
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterEvents('all', this)">All</button>
        <button class="filter-btn" onclick="filterEvents('health', this)">🏥 Health</button>
        <button class="filter-btn" onclick="filterEvents('social', this)">🤝 Social</button>
        <button class="filter-btn" onclick="filterEvents('meeting', this)">📋 Meeting</button>
        <button class="filter-btn" onclick="filterEvents('festival', this)">🎉 Festival</button>
      </div>

      <!-- Events Cards Grid -->
      <div class="events-grid" id="eventsList">
        <!-- Cards generated by JS -->
      </div>

    </main>
  </div>

  <!-- ═══════════ ADD EVENT MODAL (for Admin) ═══════════ -->
  <div class="modal-overlay" id="eventModal">
    <div class="modal">
      <h3>📅 Add New Event</h3>

      <input type="text"  id="evTitle"    placeholder="Event name..." />
      <input type="date"  id="evDate"     />
      <input type="text"  id="evTime"     placeholder="Time  e.g. 6 PM – 9 PM" />
      <input type="text"  id="evLocation" placeholder="Location  e.g. Community Hall" />

      <select id="evCategory">
        <option value="health">🏥 Health</option>
        <option value="social">🤝 Social</option>
        <option value="meeting">📋 Meeting</option>
        <option value="festival">🎉 Festival</option>
      </select>

      <textarea id="evDesc" rows="3" placeholder="Short description of the event..."></textarea>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEventModal()">Cancel</button>
        <button class="btn-submit" onclick="submitEvent()">Add Event</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/events.js"></script>
</body>
</html>
